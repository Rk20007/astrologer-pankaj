<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice" role="img" aria-label="North Indian kundali chart">
  <defs>
    <linearGradient id="kd-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2E1C0E"/>
      <stop offset="0.55" stop-color="#3A2412"/>
      <stop offset="1" stop-color="#5A3A16"/>
    </linearGradient>
    <radialGradient id="kd-glow" cx="0.5" cy="0.5" r="0.55">
      <stop offset="0" stop-color="#D4AF37" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#D4AF37" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="800" height="600" fill="url(#kd-bg)"/>
  <ellipse cx="400" cy="300" rx="300" ry="240" fill="url(#kd-glow)"/>

  <!-- constellation dots -->
  <g fill="#FFCC33" fill-opacity="0.55">
    <circle cx="96" cy="86" r="3"/><circle cx="706" cy="118" r="2.5"/>
    <circle cx="140" cy="516" r="2.5"/><circle cx="676" cy="486" r="3"/>
    <circle cx="60" cy="300" r="2"/><circle cx="742" cy="308" r="2"/>
  </g>

  <!-- kundali square + diagonals (North Indian style) -->
  <g stroke="#D4AF37" stroke-width="3" fill="none">
    <rect x="250" y="150" width="300" height="300"/>
    <path d="M250 150 550 450M550 150 250 450"/>
    <path d="M400 150 250 300 400 450 550 300z"/>
  </g>

  <!-- house numbers -->
  <g fill="#FFE9A8" font-family="Georgia, 'Times New Roman', serif" font-size="19" text-anchor="middle" opacity="0.92">
    <text x="400" y="205">1</text>
    <text x="325" y="185">12</text>
    <text x="285" y="230">11</text>
    <text x="285" y="385">9</text>
    <text x="325" y="430">8</text>
    <text x="400" y="410">7</text>
    <text x="475" y="430">6</text>
    <text x="515" y="385">5</text>
    <text x="515" y="230">3</text>
    <text x="475" y="185">2</text>
    <text x="330" y="308">10</text>
    <text x="470" y="308">4</text>
  </g>

  <!-- planet glyphs -->
  <g fill="#FFCC33" font-family="Georgia, 'Times New Roman', serif" font-size="22" text-anchor="middle">
    <text x="400" y="245">☉</text>
    <text x="340" y="345">☾</text>
    <text x="460" y="345">♂</text>
    <text x="400" y="380">♃</text>
  </g>

  <!-- document corner fold, hinting at the PDF -->
  <g opacity="0.9">
    <path d="M596 404h104v148H596z" fill="#FFFDF7" fill-opacity="0.1" stroke="#D4AF37" stroke-width="2"/>
    <path d="M596 404h72l32 32v116H596z" fill="#FFFDF7" fill-opacity="0.14" stroke="#D4AF37" stroke-width="2"/>
    <path d="M668 404v32h32" fill="none" stroke="#D4AF37" stroke-width="2"/>
    <g stroke="#D4AF37" stroke-width="3" stroke-opacity="0.75" stroke-linecap="round">
      <path d="M614 470h68M614 490h68M614 510h44"/>
    </g>
  </g>
</svg>
