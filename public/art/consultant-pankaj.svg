    <text x="400" y="102">9</text>
    <text x="568" y="278">3</text>
    <text x="400" y="452">6</text>
    <text x="232" y="278">1</text>
  </g>

  <g fill="#FFCC33" fill-opacity="0.7">
    <circle cx="150" cy="120" r="3"/><circle cx="668" cy="150" r="2.5"/>
    <circle cx="660" cy="430" r="3"/><circle cx="140" cy="420" r="2.5"/>
  </g>
