<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Havan kund with sacred flame">
  <defs>
    <linearGradient id="pj-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3A2412"/>
      <stop offset="0.55" stop-color="#7A1E1E"/>
      <stop offset="1" stop-color="#C76B00"/>
    </linearGradient>
    <radialGradient id="pj-glow" cx="0.5" cy="0.62" r="0.5">
      <stop offset="0" stop-color="#FFCC33" stop-opacity="0.75"/>
      <stop offset="0.5" stop-color="#C76B00" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#C76B00" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="pj-flame" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#C76B00"/>
      <stop offset="0.45" stop-color="#FFCC33"/>
      <stop offset="1" stop-color="#FFF6D8"/>
    </linearGradient>
    <linearGradient id="pj-kund" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#D4AF37"/>
      <stop offset="1" stop-color="#8A6A15"/>
    </linearGradient>
  </defs>

  <rect width="800" height="600" fill="url(#pj-sky)"/>

  <!-- mandala rings -->
  <g fill="none" stroke="#D4AF37" stroke-opacity="0.18">
    <circle cx="400" cy="360" r="150"/>
    <circle cx="400" cy="360" r="205"/>
    <circle cx="400" cy="360" r="262"/>
  </g>
  <g stroke="#D4AF37" stroke-opacity="0.14" stroke-width="1">
    <path d="M400 98 400 622M138 360 662 360M215 175 585 545M585 175 215 545"/>
  </g>

  <!-- temple silhouette -->
  <g fill="#3A2412" fill-opacity="0.5">
    <path d="M96 430h96l-48-96zM96 430h96v70H96z"/>
    <path d="M608 430h96l-48-96zM608 430h96v70h-96z"/>
  </g>

  <ellipse cx="400" cy="392" rx="300" ry="190" fill="url(#pj-glow)"/>

  <!-- flame -->
  <g>
    <path d="M400 196c34 44 52 74 52 104a52 52 0 1 1-104 0c0-30 18-60 52-104z" fill="url(#pj-flame)"/>
    <path d="M400 262c15 22 23 37 23 52a23 23 0 1 1-46 0c0-15 8-30 23-52z" fill="#FFF6D8" fill-opacity="0.9"/>
  </g>

  <!-- sparks -->
  <g fill="#FFCC33" fill-opacity="0.8">
    <circle cx="330" cy="232" r="4"/><circle cx="474" cy="212" r="3"/>
    <circle cx="352" cy="164" r="3"/><circle cx="452" cy="272" r="3.5"/>
    <circle cx="300" cy="292" r="2.5"/><circle cx="506" cy="300" r="2.5"/>
  </g>

  <!-- havan kund -->
  <path d="M300 384h200l-34 96H334z" fill="url(#pj-kund)"/>
  <rect x="284" y="366" width="232" height="24" rx="8" fill="#D4AF37"/>
  <rect x="316" y="480" width="168" height="18" rx="6" fill="#8A6A15"/>

  <!-- offerings -->
  <g fill="#D4AF37" fill-opacity="0.85">
    <circle cx="252" cy="500" r="16"/><circle cx="548" cy="500" r="16"/>
  </g>
  <g fill="#7A1E1E" fill-opacity="0.7">
    <circle cx="252" cy="500" r="8"/><circle cx="548" cy="500" r="8"/>
  </g>
</svg>
